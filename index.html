<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>妈妈的购物清单</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ec; --warm-white: #fffdf8; --ink: #2c1810; --ink-light: #6b4c3b;
    --red: #c0392b; --green: #27ae60; --orange: #e67e22; --border: #d4b896;
    --shadow: rgba(44, 24, 16, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); font-family: 'Noto Sans SC', sans-serif; color: var(--ink); min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(192,57,43,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(39,174,96,0.05) 0%, transparent 50%); }

  header { background: var(--ink); color: var(--cream); padding: 28px 24px 20px; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); }
  header h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 2.4rem; letter-spacing: 0.05em; position: relative; }
  header p { font-size: 0.85rem; opacity: 0.6; margin-top: 4px; position: relative; }

  .tabs { display: flex; border-bottom: 2px solid var(--border); background: var(--warm-white);
    position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px var(--shadow); }
  .tab-btn { flex: 1; padding: 14px 8px; border: none; background: transparent;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.9rem; font-weight: 500;
    color: var(--ink-light); cursor: pointer; transition: all 0.2s;
    border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); background: rgba(44,24,16,0.04); }
  .tab-btn .badge { display: inline-block; background: var(--ink); color: var(--cream);
    border-radius: 20px; font-size: 0.7rem; padding: 1px 7px; margin-left: 5px; vertical-align: middle; }

  .panel { display: none; padding: 20px 16px 110px; }
  .panel.active { display: block; }

  .add-form { background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 16px;
    padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 16px var(--shadow); }
  .add-form h2 { font-family: 'Ma Shan Zheng', cursive; font-size: 1.4rem; margin-bottom: 16px; }
  .form-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
  .form-row input, .form-row select { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; background: var(--cream); color: var(--ink);
    outline: none; transition: border-color 0.2s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--ink); }
  .input-item { flex: 2; min-width: 120px; } .input-qty { flex: 1; min-width: 70px; max-width: 90px; }
  .input-unit { flex: 1; min-width: 70px; max-width: 90px; } .input-note { flex: 3; min-width: 150px; }
  .btn-add { background: var(--ink); color: var(--cream); border: none; border-radius: 10px;
    padding: 10px 20px; font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem;
    cursor: pointer; transition: transform 0.1s; white-space: nowrap; }
  .btn-add:active { transform: scale(0.96); }

  /* Share box */
  .share-box { background: var(--warm-white); border: 2px dashed var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .share-box h3 { font-family: 'Ma Shan Zheng', cursive; font-size: 1.3rem; margin-bottom: 6px; }
  .share-box p { font-size: 0.85rem; color: var(--ink-light); margin-bottom: 14px; }
  .share-url { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px;
    font-size: 0.75rem; background: var(--cream); color: var(--ink-light); font-family: monospace;
    margin-bottom: 12px; word-break: break-all; min-height: 58px; resize: none; outline: none; line-height: 1.5; }
  .share-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-share { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem; cursor: pointer; transition: transform 0.1s; }
  .btn-share:active { transform: scale(0.96); }
  .btn-gen { background: var(--ink); color: var(--cream); }
  .btn-copy { background: var(--green); color: white; }
  .copied-tip { font-size: 0.82rem; color: var(--green); margin-top: 10px; display: none; font-weight: 500; }

  /* Loaded banner */
  .loaded-banner { background: #e8f8ef; border: 1.5px solid var(--green); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
  .loaded-banner span { flex: 1; }
  .loaded-banner button { border: none; background: transparent; color: var(--ink-light); cursor: pointer; font-size: 1rem; padding: 2px 6px; }

  .section-title { font-family: 'Ma Shan Zheng', cursive; font-size: 1.5rem; color: var(--ink);
    margin: 0 0 14px; display: flex; align-items: center; gap: 10px; }
  .section-title .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink); flex-shrink: 0; }
  .section-title .dot.green { background: var(--green); }
  .section-title .dot.orange { background: var(--orange); }

  .item-list { display: flex; flex-direction: column; gap: 10px; }
  .item-card { background: var(--warm-white); border: 1.5px solid var(--border); border-radius: 14px;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px var(--shadow); transition: transform 0.15s; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .item-card.bought { border-color: var(--green); background: #f0faf4; }
  .item-card.partial { border-color: var(--orange); background: #fef9f0; }

  .check-btn { width: 38px; height: 38px; border-radius: 50%; border: 2.5px solid var(--border);
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0; transition: all 0.2s; color: transparent; }
  .check-btn:hover { border-color: var(--ink); }
  .check-btn.done { background: var(--green); border-color: var(--green); color: white; }
  .check-btn.pm { background: var(--orange); border-color: var(--orange); color: white; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 1.05rem; font-weight: 500; margin-bottom: 2px; }
  .item-meta { font-size: 0.8rem; color: var(--ink-light); }
  .item-qty-badge { background: var(--cream); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 4px 12px; font-size: 0.85rem; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .item-qty-badge.green { border-color: var(--green); color: var(--green); background: #f0faf4; }
  .item-qty-badge.orange { border-color: var(--orange); color: var(--orange); background: #fef9f0; }

  .del-btn { background: transparent; border: none; color: #ccc; font-size: 1.1rem;
    cursor: pointer; padding: 4px; border-radius: 6px; transition: color 0.2s; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }
  .empty-hint { text-align: center; color: var(--ink-light); font-size: 0.9rem; padding: 32px 16px; opacity: 0.6; }

  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px;
    background: var(--warm-white); border-top: 1.5px solid var(--border); display: flex; gap: 10px; z-index: 20; }
  .btn-action { flex: 1; padding: 13px; border-radius: 12px; border: none;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-action:active { transform: scale(0.97); }
  .btn-clear { background: #f5ede5; color: var(--ink-light); }
  .btn-print { background: var(--ink); color: var(--cream); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,24,16,0.5);
    z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--warm-white); border-radius: 20px; padding: 28px 24px; max-width: 340px; width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2); animation: popUp 0.2s ease; }
  @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 { font-family: 'Ma Shan Zheng', cursive; font-size: 1.4rem; margin-bottom: 6px; }
  .modal .modal-sub { font-size: 0.85rem; color: var(--ink-light); margin-bottom: 20px; }
  .modal label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; }
  .modal input[type=number] { width: 100%; border: 2px solid var(--border); border-radius: 12px;
    padding: 12px 16px; font-size: 1.2rem; font-family: 'Noto Sans SC', sans-serif;
    background: var(--cream); color: var(--ink); outline: none; margin-bottom: 20px; text-align: center; }
  .modal input[type=number]:focus { border-color: var(--ink); }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-family: 'Noto Sans SC', sans-serif; font-size: 0.95rem; cursor: pointer; }
  .btn-cancel { background: #f0ebe4; color: var(--ink-light); }
  .btn-confirm { background: var(--green); color: white; font-weight: 500; }
  .btn-not-found { background: var(--red); color: white; }

  @media print {
    body { background: white; }
    header, .tabs, .bottom-bar, .add-form, .share-box, .loaded-banner,
    .del-btn, .check-btn, .modal-overlay { display: none !important; }
    .panel { display: block !important; padding: 0 !important; }
    #panel-shop { display: block !important; }
    #panel-edit { display: none !important; }
    .item-card { box-shadow: none; border-color: #ccc; break-inside: avoid; }
    .print-header { display: block !important; }
  }
  .print-header { display: none; text-align: center; margin-bottom: 20px; }
  .print-header h2 { font-family: 'Ma Shan Zheng', cursive; font-size: 2rem; }
  .print-header p { color: #888; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <h1>🛒 妈妈的购物清单</h1>
  <p>妈妈填写 · 生成链接 · 孩子去买</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('edit')" id="tab-edit">✏️ 妈妈填写</button>
  <button class="tab-btn" onclick="switchTab('shop')" id="tab-shop">
    🛍️ 去超市买 <span class="badge" id="badge-need">0</span>
  </button>
</div>

<!-- Panel: Edit -->
<div class="panel active" id="panel-edit">
  <div class="loaded-banner" id="loaded-banner" style="display:none;">
    <span>✅ 已从链接加载清单，可以继续编辑后重新生成链接</span>
    <button onclick="document.getElementById('loaded-banner').style.display='none'">✕</button>
  </div>

  <div class="add-form">
    <h2>➕ 添加要买的东西</h2>
    <div class="form-row">
      <input class="input-item" type="text" id="inp-name" placeholder="食材名称（如：西兰花）" />
      <input class="input-qty" type="number" id="inp-qty" placeholder="数量" min="0.1" step="0.1" />
      <select class="input-unit" id="inp-unit">
        <option>个</option><option>斤</option><option>克</option><option>公斤</option>
        <option>袋</option><option>盒</option><option>瓶</option><option>束</option>
        <option>根</option><option>条</option><option>片</option><option>包</option>
      </select>
    </div>
    <div class="form-row">
      <input class="input-note" type="text" id="inp-note" placeholder="备注（如：要新鲜的、大一点的）" />
      <button class="btn-add" onclick="addItem()">添加</button>
    </div>
  </div>

  <div class="share-box">
    <h3>📤 生成购物链接</h3>
    <p>填好清单后，点「生成链接」，复制后发给孩子，孩子打开就能看到清单啦～</p>
    <textarea class="share-url" id="share-url" readonly placeholder="点击「生成链接」后这里会出现链接…"></textarea>
    <div class="share-btns">
      <button class="btn-share btn-gen" onclick="generateLink()">🔗 生成链接</button>
      <button class="btn-share btn-copy" onclick="copyLink()" id="copy-btn" style="display:none;">📋 复制链接</button>
    </div>
    <div class="copied-tip" id="copied-tip">✅ 已复制！去微信粘贴发给孩子吧～</div>
  </div>

  <div class="section-title"><div class="dot"></div>清单列表</div>
  <div class="item-list" id="edit-list">
    <div class="empty-hint" id="edit-empty">还没有添加任何东西～</div>
  </div>
</div>

<!-- Panel: Shop -->
<div class="panel" id="panel-shop">
  <div class="print-header">
    <h2>🛒 购物清单</h2>
    <p id="print-date"></p>
  </div>

  <div id="sec-need">
    <div class="section-title"><div class="dot"></div>需要买到</div>
    <div class="item-list" id="need-list">
      <div class="empty-hint" id="need-empty">清单是空的，让妈妈先填写吧～</div>
    </div>
  </div>

  <div style="height:24px;"></div>

  <div id="sec-bought" style="display:none;">
    <div class="section-title"><div class="dot green"></div>✅ 已经购买</div>
    <div class="item-list" id="bought-list"></div>
    <div style="height:24px;"></div>
  </div>

  <div id="sec-partial" style="display:none;">
    <div class="section-title"><div class="dot orange"></div>⚠️ 没有买到 / 数量不够</div>
    <div class="item-list" id="partial-list"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-action btn-clear" onclick="clearAll()">🗑️ 清空清单</button>
  <button class="btn-action btn-print" onclick="doPrint()">🖨️ 打印 / 保存PDF</button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">买了多少？</h3>
    <p class="modal-sub" id="modal-sub"></p>
    <label id="modal-label">实际买到数量</label>
    <input type="number" id="modal-qty" min="0" step="0.1" placeholder="0" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-not-found" onclick="confirmBuy(true)">完全没有</button>
      <button class="btn-confirm" onclick="confirmBuy(false)">确认</button>
    </div>
  </div>
</div>

<script>
let items = [];
let pendingId = null;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtQty(n, u) { return (Number.isInteger(n) ? n : parseFloat(n.toFixed(2))) + ' ' + u; }
function save() { try { localStorage.setItem('shoplist_v2', JSON.stringify(items)); } catch(e){} }

// ---- URL encode/decode (UTF-8 safe base64) ----
function encodeData(obj) {
  const json = JSON.stringify(obj);
  const bytes = new TextEncoder().encode(json);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function decodeData(str) {
  try {
    const bin = atob(str);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return JSON.parse(new TextDecoder().decode(bytes));
  } catch(e) { return null; }
}

// ---- Init: load from URL hash or localStorage ----
(function init() {
  const hash = location.hash;
  if (hash.startsWith('#data=')) {
    const data = decodeData(hash.slice(6));
    if (data && Array.isArray(data)) {
      items = data.map(i => ({ ...i, status: 'need', boughtQty: 0 }));
      document.getElementById('loaded-banner').style.display = 'flex';
      history.replaceState(null, '', location.pathname + location.search);
      render();
      return;
    }
  }
  try { items = JSON.parse(localStorage.getItem('shoplist_v2') || '[]'); } catch(e) { items = []; }
  render();
})();

// ---- Generate share link ----
function generateLink() {
  if (items.length === 0) { alert('清单还是空的，先添加一些东西吧～'); return; }
  const payload = items.map(({ id, name, qty, unit, note }) => ({ id, name, qty, unit, note }));
  const encoded = encodeData(payload);
  const url = location.href.split('#')[0] + '#data=' + encoded;
  const box = document.getElementById('share-url');
  box.value = url;
  document.getElementById('copy-btn').style.display = 'inline-block';
  document.getElementById('copied-tip').style.display = 'none';
  box.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function copyLink() {
  const url = document.getElementById('share-url').value;
  if (!url) return;
  navigator.clipboard.writeText(url).then(() => {
    document.getElementById('copied-tip').style.display = 'block';
    setTimeout(() => document.getElementById('copied-tip').style.display = 'none', 5000);
  }).catch(() => {
    document.getElementById('share-url').select();
    document.execCommand('copy');
    document.getElementById('copied-tip').style.display = 'block';
    setTimeout(() => document.getElementById('copied-tip').style.display = 'none', 5000);
  });
}

// ---- CRUD ----
function addItem() {
  const name = document.getElementById('inp-name').value.trim();
  const qty = parseFloat(document.getElementById('inp-qty').value);
  const unit = document.getElementById('inp-unit').value;
  const note = document.getElementById('inp-note').value.trim();
  if (!name) { alert('请输入食材名称！'); return; }
  if (!qty || qty <= 0) { alert('请输入正确的数量！'); return; }
  items.push({ id: genId(), name, qty, unit, note, status: 'need', boughtQty: 0 });
  save(); render();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-qty').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('share-url').value = '';
  document.getElementById('copy-btn').style.display = 'none';
  document.getElementById('inp-name').focus();
}

function deleteItem(id) { items = items.filter(i => i.id !== id); save(); render(); }

function clearAll() {
  if (!confirm('确定要清空整个购物清单吗？')) return;
  items = []; save(); render();
  document.getElementById('share-url').value = '';
  document.getElementById('copy-btn').style.display = 'none';
}

function openModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  pendingId = id;
  document.getElementById('modal-title').textContent = `"${item.name}" 买了多少？`;
  document.getElementById('modal-sub').textContent = `需要：${fmtQty(item.qty, item.unit)}`;
  document.getElementById('modal-label').textContent = `实际买到的数量（${item.unit}）`;
  document.getElementById('modal-qty').value = item.qty;
  document.getElementById('modal').classList.add('show');
  setTimeout(() => document.getElementById('modal-qty').focus(), 100);
}

function closeModal() { document.getElementById('modal').classList.remove('show'); pendingId = null; }

function confirmBuy(notFound) {
  const item = items.find(i => i.id === pendingId);
  if (!item) return;
  const actual = notFound ? 0 : parseFloat(document.getElementById('modal-qty').value);
  if (!notFound && (isNaN(actual) || actual < 0)) { alert('请输入有效数量'); return; }
  item.boughtQty = actual;
  item.status = actual >= item.qty ? 'bought' : 'partial';
  save(); closeModal(); render();
}

function undoItem(id) {
  const it = items.find(i => i.id === id);
  if (it) { it.status = 'need'; it.boughtQty = 0; save(); render(); }
}

// ---- Render ----
function render() {
  const need = items.filter(i => i.status === 'need');
  const bought = items.filter(i => i.status === 'bought');
  const partial = items.filter(i => i.status === 'partial');
  document.getElementById('badge-need').textContent = need.length;

  function clearAndFill(listId, cards) {
    const el = document.getElementById(listId);
    Array.from(el.querySelectorAll('.item-card')).forEach(e => e.remove());
    cards.forEach(c => el.appendChild(c));
  }

  // Edit list
  document.getElementById('edit-empty').style.display = items.length ? 'none' : 'block';
  clearAndFill('edit-list', items.map(item => {
    const d = document.createElement('div');
    d.className = 'item-card';
    const st = item.status === 'bought'
      ? `<span style="color:var(--green);font-size:0.8rem;">✅ 已买 ${fmtQty(item.boughtQty, item.unit)}</span>`
      : item.status === 'partial'
      ? `<span style="color:var(--orange);font-size:0.8rem;">⚠️ 买了 ${fmtQty(item.boughtQty, item.unit)}</span>` : '';
    d.innerHTML = `<div class="item-info"><div class="item-name">${item.name}</div>
      <div class="item-meta">需要：${fmtQty(item.qty, item.unit)}${item.note ? ' · '+item.note : ''} ${st}</div></div>
      <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>`;
    return d;
  }));

  // Need list
  document.getElementById('need-empty').style.display = need.length ? 'none' : 'block';
  clearAndFill('need-list', need.map(item => {
    const d = document.createElement('div'); d.className = 'item-card';
    d.innerHTML = `<button class="check-btn" onclick="openModal('${item.id}')">✓</button>
      <div class="item-info"><div class="item-name">${item.name}</div>
      ${item.note ? `<div class="item-meta">${item.note}</div>` : ''}</div>
      <span class="item-qty-badge">${fmtQty(item.qty, item.unit)}</span>`;
    return d;
  }));

  // Bought list
  document.getElementById('sec-bought').style.display = bought.length ? 'block' : 'none';
  clearAndFill('bought-list', bought.map(item => {
    const d = document.createElement('div'); d.className = 'item-card bought';
    d.innerHTML = `<button class="check-btn done" onclick="undoItem('${item.id}')">✓</button>
      <div class="item-info"><div class="item-name" style="text-decoration:line-through;opacity:0.6;">${item.name}</div>
      ${item.note ? `<div class="item-meta">${item.note}</div>` : ''}</div>
      <span class="item-qty-badge green">${fmtQty(item.boughtQty, item.unit)}</span>`;
    return d;
  }));

  // Partial list
  document.getElementById('sec-partial').style.display = partial.length ? 'block' : 'none';
  clearAndFill('partial-list', partial.map(item => {
    const d = document.createElement('div'); d.className = 'item-card partial';
    const label = item.boughtQty === 0 ? '没有买到' : `只买到 ${fmtQty(item.boughtQty, item.unit)}`;
    d.innerHTML = `<button class="check-btn pm" onclick="undoItem('${item.id}')">⚠</button>
      <div class="item-info"><div class="item-name">${item.name}</div>
      <div class="item-meta">需要：${fmtQty(item.qty, item.unit)}${item.note ? ' · '+item.note : ''}</div></div>
      <span class="item-qty-badge orange">${label}</span>`;
    return d;
  }));
}

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

function doPrint() {
  document.getElementById('print-date').textContent = '打印时间：' + new Date().toLocaleString('zh-CN');
  switchTab('shop'); setTimeout(() => window.print(), 100);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
document.getElementById('inp-note').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-qty').focus(); });
</script>
</body>
</html>
